<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-admin { background: #e74c3c; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; transition: 0.15s; }
        .sidebar a:hover { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .sidebar .section-title { padding: 15px 25px 6px; font-size: 12px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .main { flex: 1; padding: 30px; }
        .main h2 { color: #2c3e50; margin-bottom: 15px; font-size: 22px; }
        .card { background: #fff; border-radius: 6px; padding: 25px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .card p { color: #666; font-size: 15px; line-height: 1.8; }
        .welcome { font-size: 20px; color: #2c3e50; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag" th:classappend="${session.role == 'ADMIN'} ? 'tag-admin'" th:text="${session.role == 'ADMIN'} ? '管理员' : '学生'"></span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar" th:if="${session.role == 'STUDENT'}">
        <div class="section-title">个人信息</div>
        <a href="#">查看学生信息</a>
        <div class="section-title">查询浏览</div>
        <a href="/class">浏览班级</a>
        <a href="#">浏览课程</a>
        <div class="section-title">业务功能</div>
        <a href="#">我的选课</a>
        <a href="#">我的考勤</a>
        <a href="#">请假申请</a>
        <a href="#">我的成绩</a>
        <div class="section-title">系统</div>
        <a href="#">修改密码</a>
    </div>
    <div class="sidebar" th:if="${session.role == 'ADMIN'}">
        <div class="section-title">基础资料</div>
        <a href="#">学生管理</a>
        <a href="/class">班级管理</a>
        <a href="#">课程管理</a>
        <div class="section-title">业务管理</div>
        <a href="#">选课管理</a>
        <a href="#">考勤管理</a>
        <a href="#">请假管理</a>
        <a href="#">成绩管理</a>
        <div class="section-title">系统</div>
        <a href="#">系统管理</a>
    </div>
    <div class="main">
        <div class="card">
            <div class="welcome">欢迎使用学生管理系统</div>
            <p>当前角色：<strong th:text="${session.role == 'ADMIN'} ? '管理员' : '学生'"></strong></p>
            <p>当前为通用骨架版第一阶段。功能模块将在后续阶段逐步实现。</p>
        </div>
    </div>
</div>
</body>
</html>
