<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }

        /* 顶部导航 - 后台深色 */
        .header {
            background: #2c3e50;
            color: #fff;
            padding: 0 30px;
            height: 56px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
        }
        .header h3 { font-size: 18px; font-weight: 500; letter-spacing: 1px; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-admin { background: #e74c3c; }

        .container { display: flex; min-height: calc(100vh - 56px); }

        /* 左侧菜单 */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            background: #fff;
            padding-top: 10px;
            box-shadow: 2px 0 6px rgba(0,0,0,0.05);
        }
        .sidebar a {
            display: block;
            padding: 12px 25px;
            color: #555;
            text-decoration: none;
            font-size: 14px;
            border-left: 3px solid transparent;
            white-space: nowrap;
            transition: 0.15s;
        }
        .sidebar a:hover {
            background: #f5f6fa;
            color: #2c3e50;
            border-left-color: #3498db;
        }
        .sidebar .section-title {
            padding: 15px 25px 6px;
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 右侧主内容区 */
        .main {
            flex: 1;
            min-width: 0;
            position: relative;
            background: #2c3e50;
            padding: 30px;
        }
        .main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('/images/1.jpg') center/cover no-repeat;
            filter: brightness(0.65);
            z-index: 0;
        }
        .main::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.30);
            z-index: 0;
        }

        /* 欢迎卡片 */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(8px);
            border-radius: 8px;
            padding: 28px 36px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: inline-block;
            max-width: 520px;
        }
        .card .welcome { font-size: 20px; color: #2c3e50; margin-bottom: 10px; font-weight: 600; }
        .card p { color: #666; font-size: 15px; line-height: 1.8; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag" th:classappend="${session.role == 'ADMIN'} ? 'tag-admin'" th:text="${session.role == 'ADMIN'} ? '管理员' : '学生'"></span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar" th:if="${session.role == 'STUDENT'}">
        <div class="section-title">个人信息</div>
        <a href="/student/profile">查看学生信息</a>
        <div class="section-title">查询浏览</div>
        <a href="/class">浏览班级</a>
        <a href="/course">浏览课程</a>
        <div class="section-title">业务功能</div>
        <a href="/selection/my">我的选课</a>
        <a href="/attendance/my">我的考勤</a>
        <a href="/leave/my">请假申请</a>
        <a href="/grade/my">我的成绩</a>
        <div class="section-title">系统</div>
        <a href="/system/password">修改密码</a>
    </div>
    <div class="sidebar" th:if="${session.role == 'ADMIN'}">
        <div class="section-title">基础资料</div>
        <a href="/student">学生管理</a>
        <a href="/class">班级管理</a>
        <a href="/course">课程管理</a>
        <div class="section-title">业务管理</div>
        <a href="/selection">选课管理</a>
        <a href="/attendance">考勤管理</a>
        <a href="/leave">请假管理</a>
        <a href="/grade">成绩管理</a>
        <a href="/grade/statistics">成绩统计</a>
        <div class="section-title">系统</div>
        <a href="/system/password">系统管理</a>
    </div>
    <div class="main">
        <div class="card">
            <div class="welcome">欢迎使用学生管理系统</div>
            <p>当前角色：<strong th:text="${session.role == 'ADMIN'} ? '管理员' : '学生'"></strong></p>
            <p>你好，Welcome</p>
        </div>
    </div>
</div>
</body>
</html>
