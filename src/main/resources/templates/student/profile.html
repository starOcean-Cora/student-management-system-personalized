<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的信息 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; padding: 25px 30px; }
        .main h2 { color: #2c3e50; font-size: 20px; margin-bottom: 15px; }
        .message { background: #d4edda; color: #155724; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .card { background: #fff; border-radius: 6px; padding: 25px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .info-grid { display: grid; grid-template-columns: 120px 1fr; gap: 12px 20px; font-size: 14px; }
        .info-label { color: #888; }
        .info-value { color: #333; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 3px; font-size: 12px; }
        .badge-active { background: #d4edda; color: #155724; }
        .btn { padding: 9px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .section-title { font-size: 16px; font-weight: 600; color: #2c3e50; margin: 25px 0 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .form-inline { display: flex; gap: 10px; align-items: flex-end; margin-top: 10px; }
        .form-inline input { flex: 1; padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-inline input:focus { outline: none; border-color: #3498db; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag">学生</span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar">
        <a href="/student/profile" class="active">查看学生信息</a>
        <a href="/class">浏览班级</a>
        <a href="/course">浏览课程</a>
        <a href="/selection/my">我的选课</a>
        <a href="/attendance/my">我的考勤</a>
        <a href="/leave/my">请假申请</a>
        <a href="/grade/my">我的成绩</a>
        <a href="#">修改密码</a>
    </div>
    <div class="main">
        <h2>我的信息</h2>
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <div class="card">
            <div class="info-grid">
                <span class="info-label">学号：</span><span class="info-value" th:text="${studentInfo.studentNo}"></span>
                <span class="info-label">姓名：</span><span class="info-value" th:text="${studentInfo.name}"></span>
                <span class="info-label">性别：</span><span class="info-value" th:text="${studentInfo.gender} == 1 ? '男' : (${studentInfo.gender} == 0 ? '女' : '未设置')"></span>
                <span class="info-label">班级：</span><span class="info-value" th:text="${studentInfo.className} ?: '未分配'"></span>
                <span class="info-label">手机号：</span><span class="info-value" th:text="${studentInfo.phone} ?: '未设置'"></span>
                <span class="info-label">邮箱：</span><span class="info-value" th:text="${studentInfo.email} ?: '未设置'"></span>
                <span class="info-label">状态：</span><span class="info-value"><span class="badge badge-active" th:text="${studentInfo.status} == 1 ? '在读' : '离校'"></span></span>
            </div>

            <div class="section-title">修改头像</div>
            <form th:action="@{/student/profile/avatar}" method="post">
                <div class="form-inline">
                    <input type="text" name="avatar" th:value="${studentInfo.avatar}" placeholder="请输入头像图片URL或路径" />
                    <button type="submit" class="btn btn-primary">保存头像</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
