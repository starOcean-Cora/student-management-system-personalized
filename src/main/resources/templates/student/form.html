<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${studentInfo} != null ? '编辑学生' : '新增学生'">学生表单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .main { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-card h2 { margin-bottom: 20px; color: #2c3e50; font-size: 20px; }
        .error { background: #f8d7da; color: #721c24; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #3498db; }
        .btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-default { background: #95a5a6; color: #fff; }
        .btn-default:hover { background: #7f8c8d; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <a href="/student" style="color:#ecf0f1;text-decoration:none;padding:5px 10px;">返回</a>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="main">
    <div class="form-card">
        <h2 th:text="${studentInfo} != null ? '编辑学生' : '新增学生'">新增学生</h2>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <form th:action="@{/student/save}" method="post">
            <input type="hidden" name="id" th:if="${studentInfo} != null" th:value="${studentInfo.id}" />
            <div class="form-group">
                <label>学号 <span style="color:red">*</span></label>
                <input type="text" name="studentNo" required th:value="${studentInfo} != null ? ${studentInfo.studentNo} : ''" />
            </div>
            <div class="form-group">
                <label>姓名 <span style="color:red">*</span></label>
                <input type="text" name="name" required th:value="${studentInfo} != null ? ${studentInfo.name} : ''" />
            </div>
            <div class="form-group">
                <label>性别</label>
                <select name="gender">
                    <option value="">请选择</option>
                    <option value="1" th:selected="${studentInfo} != null and ${studentInfo.gender} == 1">男</option>
                    <option value="0" th:selected="${studentInfo} != null and ${studentInfo.gender} == 0">女</option>
                </select>
            </div>
            <div class="form-group">
                <label>班级ID</label>
                <input type="number" name="classId" th:value="${studentInfo} != null ? ${studentInfo.classId} : ''" />
            </div>
            <div class="form-group">
                <label>班级名称</label>
                <input type="text" name="className" th:value="${studentInfo} != null ? ${studentInfo.className} : ''" />
            </div>
            <div class="form-group">
                <label>手机号</label>
                <input type="text" name="phone" th:value="${studentInfo} != null ? ${studentInfo.phone} : ''" />
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" name="email" th:value="${studentInfo} != null ? ${studentInfo.email} : ''" />
            </div>
            <div class="form-group">
                <label>头像</label>
                <input type="text" name="avatar" th:value="${studentInfo} != null ? ${studentInfo.avatar} : ''" />
            </div>
            <div class="form-group">
                <label>状态</label>
                <select name="status">
                    <option value="1" th:selected="${studentInfo} == null or ${studentInfo.status} == 1">在读</option>
                    <option value="0" th:selected="${studentInfo} != null and ${studentInfo.status} == 0">离校</option>
                </select>
            </div>
            <div class="btns">
                <button type="submit" class="btn btn-primary" th:text="${studentInfo} != null ? '更新' : '保存'">保存</button>
                <a href="/student" class="btn btn-default">返回</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
