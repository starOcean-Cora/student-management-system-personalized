<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>学生管理 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-admin { background: #e74c3c; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; padding: 25px 30px; }
        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .topbar h2 { color: #2c3e50; font-size: 20px; }
        .message { background: #d4edda; color: #155724; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .error { background: #f8d7da; color: #721c24; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        .table-card { background: #fff; border-radius: 6px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .filter-form { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-form input, .filter-form select { height: 34px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: inherit; }
        .filter-form input { width: 180px; }
        .filter-form select { width: 180px; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; white-space: nowrap; }
        th { background: #fafbfc; font-weight: 600; color: #555; }
        tr:hover { background: #f8f9fa; }
        .actions { display: flex; gap: 6px; }
        .empty { text-align: center; color: #999; padding: 24px 0; }
        .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 16px; font-size: 13px; color: #555; flex-wrap: wrap; }
        .page-btn { min-width: 30px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; color: #2c3e50; text-decoration: none; background: #fff; text-align: center; }
        .page-btn:hover { background: #f5f6fa; }
        .page-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        .page-btn.disabled { color: #aaa; background: #f5f5f5; cursor: not-allowed; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }

        .card-footer { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
        .card-footer .pagination { margin-top: 0; }
        .select-col { width: 42px; text-align: center; }
        .batch-form { margin: 0; }
        .btn-danger:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag tag-admin">管理员</span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar">
        <a href="/student" class="active">学生管理</a>
        <a href="/class">班级管理</a>
        <a href="/course">课程管理</a>
        <a href="/selection">选课管理</a>
        <a href="/attendance">考勤管理</a>
        <a href="/leave">请假管理</a>
        <a href="/grade">成绩管理</a>
        <a href="/grade/statistics">成绩统计</a>
        <a href="/system/password">系统管理</a>
    </div>
    <div class="main">
        <div class="topbar">
            <h2>学生管理</h2>
            <a href="/student/add" class="btn btn-success">新增学生</a>
        </div>
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div class="table-card">
            <form class="filter-form" th:action="@{/student}" method="get">
                <input type="text" name="name" placeholder="请输入学生姓名" th:value="${name}">
                <select name="classId">
                    <option value="">全部班级</option>
                    <option th:each="c : ${classes}"
                            th:value="${c.id}"
                            th:text="${c.className}"
                            th:selected="${classId != null and classId == c.id}"></option>
                </select>
                <button type="submit" class="btn btn-success">查询</button>
                <a th:href="@{/student}" class="btn btn-warning">清空条件</a>
            </form>
            <form id="batchDeleteForm" class="batch-form" th:action="@{/student/batch-delete}" method="post">
                <input type="hidden" name="name" th:value="${name}">
                <input type="hidden" name="classId" th:value="${classId}">
                <input type="hidden" name="page" th:value="${page}">
            <div class="table-wrap">
                <table>
                    <thead>
                    <tr>
                        <th class="select-col"><input type="checkbox" id="selectAll" th:disabled="${#lists.isEmpty(students)}"></th><th>ID</th><th>学号</th><th>姓名</th><th>性别</th><th>班级</th><th>手机号</th><th>邮箱</th><th>头像</th><th>状态</th><th>操作</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="11" class="empty">暂无学生数据</td>
                    </tr>
                    <tr th:each="s : ${students}">
                        <td class="select-col"><input type="checkbox" class="row-check" name="ids" th:value="${s.id}"></td><td th:text="${s.id}"></td>
                        <td th:text="${s.studentNo}"></td>
                        <td th:text="${s.name}"></td>
                        <td th:text="${s.gender} == 1 ? '男' : (${s.gender} == 0 ? '女' : '')"></td>
                        <td th:text="${s.className}"></td>
                        <td th:text="${s.phone}"></td>
                        <td th:text="${s.email}"></td>
                        <td th:text="${s.avatar}"></td>
                        <td th:text="${s.status} == 1 ? '在读' : '离校'"></td>
                        <td class="actions">
                            <a th:href="@{/student/edit/{id}(id=${s.id})}" class="btn btn-primary">编辑</a>
                            <a th:href="@{/student/delete/{id}(id=${s.id})}" class="btn btn-danger" onclick="return confirm('确认删除该学生吗？')">删除</a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <div class="card-footer"><button type="submit" id="batchDeleteBtn" class="btn btn-danger" disabled>&#25209;&#37327;&#21024;&#38500;</button><div class="pagination">
                <span th:text="'共 ' + ${totalElements} + ' 条'">共 0 条</span>
                <span th:if="${currentPage <= 1}" class="page-btn disabled">上一页</span>
                <a th:if="${currentPage > 1}"
                   th:href="@{/student(page=${currentPage - 1}, name=${name}, classId=${classId})}"
                   class="page-btn">上一页</a>
                <span th:if="${totalPages == 0}" class="page-btn active">1</span>
                <a th:if="${totalPages > 0}"
                   th:each="p : ${pageNumbers}"
                   th:href="@{/student(page=${p}, name=${name}, classId=${classId})}"
                   th:text="${p}"
                   th:class="${p == currentPage ? 'page-btn active' : 'page-btn'}"></a>
                <span th:if="${currentPage >= totalPages}" class="page-btn disabled">下一页</span>
                <a th:if="${currentPage < totalPages}"
                   th:href="@{/student(page=${currentPage + 1}, name=${name}, classId=${classId})}"
                   class="page-btn">下一页</a>
                <span th:text="'第 ' + ${currentPage} + ' / ' + ${totalPages == 0 ? 1 : totalPages} + ' 页'">第 1 / 1 页</span>
            </div></div>
            </form>
        </div>
    </div>
</div>

<script>
(function () {
    var form = document.getElementById('batchDeleteForm');
    if (!form) return;
    var selectAll = document.getElementById('selectAll');
    var checkboxes = Array.prototype.slice.call(document.querySelectorAll('.row-check'));
    var button = document.getElementById('batchDeleteBtn');
    function updateState() {
        var checkedCount = checkboxes.filter(function (cb) { return cb.checked; }).length;
        if (button) button.disabled = checkedCount === 0;
        if (selectAll) selectAll.checked = checkboxes.length > 0 && checkedCount === checkboxes.length;
    }
    if (selectAll) {
        selectAll.addEventListener('change', function () {
            checkboxes.forEach(function (cb) { cb.checked = selectAll.checked; });
            updateState();
        });
    }
    checkboxes.forEach(function (cb) { cb.addEventListener('change', updateState); });
    form.addEventListener('submit', function (e) {
        var checkedCount = checkboxes.filter(function (cb) { return cb.checked; }).length;
        if (checkedCount === 0) {
            alert('\u8bf7\u81f3\u5c11\u9009\u62e9\u4e00\u6761\u8bb0\u5f55');
            e.preventDefault();
            return;
        }
        if (!confirm('\u786e\u5b9a\u5220\u9664\u9009\u4e2d\u7684 ' + checkedCount + ' \u6761\u8bb0\u5f55\u5417\uff1f\u6b64\u64cd\u4f5c\u4e0d\u53ef\u6062\u590d\u3002')) {
            e.preventDefault();
        }
    });
    updateState();
})();
</script>
</body>
</html>
