<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${classInfo} != null ? '编辑班级' : '新增班级'">班级表单</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .main { max-width: 600px; margin: 40px auto; padding: 0 20px; }
        .form-card { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .form-card h2 { margin-bottom: 20px; color: #2c3e50; font-size: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input, .form-group textarea { width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #3498db; }
        .btns { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 10px 24px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-default { background: #95a5a6; color: #fff; }
        .btn-default:hover { background: #7f8c8d; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <a href="/class" style="color:#ecf0f1;text-decoration:none;padding:5px 10px;">返回</a>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="main">
    <div class="form-card">
        <h2 th:text="${classInfo} != null ? '编辑班级' : '新增班级'">新增班级</h2>
        <form th:action="@{/class/save}" method="post">
            <input type="hidden" name="id" th:if="${classInfo} != null" th:value="${classInfo.id}" />
            <div class="form-group">
                <label>班级名称 <span style="color:red">*</span></label>
                <input type="text" name="className" required th:value="${classInfo} != null ? ${classInfo.className} : ''" />
            </div>
            <div class="form-group">
                <label>年级</label>
                <input type="text" name="grade" th:value="${classInfo} != null ? ${classInfo.grade} : ''" />
            </div>
            <div class="form-group">
                <label>专业</label>
                <input type="text" name="major" th:value="${classInfo} != null ? ${classInfo.major} : ''" />
            </div>
            <div class="form-group">
                <label>班主任/教师</label>
                <input type="text" name="teacherName" th:value="${classInfo} != null ? ${classInfo.teacherName} : ''" />
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea name="remark" rows="3" th:text="${classInfo} != null ? ${classInfo.remark} : ''"></textarea>
            </div>
            <div class="btns">
                <button type="submit" class="btn btn-primary" th:text="${classInfo} != null ? '更新' : '保存'">保存</button>
                <a href="/class" class="btn btn-default">返回</a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
