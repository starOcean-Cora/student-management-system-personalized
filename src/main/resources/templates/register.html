<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>注册 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .register-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 420px; }
        h2 { text-align: center; margin-bottom: 25px; color: #2c3e50; }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 4px; margin-bottom: 15px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #3498db; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .btn-primary { background: #27ae60; color: #fff; }
        .btn-primary:hover { background: #219a52; }
        .links { text-align: center; margin-top: 15px; font-size: 14px; }
        .links a { color: #3498db; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="register-box">
    <h2>学生注册</h2>
    <div th:if="${error}" class="error" th:text="${error}"></div>
    <form th:action="@{/register}" method="post">
        <div class="form-group">
            <label>用户名</label>
            <input type="text" name="username" required placeholder="请输入用户名" />
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" name="password" required placeholder="请输入密码" />
        </div>
        <div class="form-group">
            <label>确认密码</label>
            <input type="password" name="confirmPassword" required placeholder="请再次输入密码" />
        </div>
        <div class="form-group">
            <label>学号</label>
            <input type="text" name="studentNo" required placeholder="请输入学号" />
        </div>
        <div class="form-group">
            <label>姓名</label>
            <input type="text" name="name" required placeholder="请输入姓名" />
        </div>
        <button type="submit" class="btn btn-primary">注 册</button>
    </form>
    <div class="links">
        已有账号？<a href="/login">立即登录</a>
    </div>
</div>
</body>
</html>
