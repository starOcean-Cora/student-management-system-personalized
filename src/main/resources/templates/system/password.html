<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>修改密码 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-admin { background: #e74c3c; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; display: flex; justify-content: center; padding-top: 60px; }
        .form-card { background: #fff; padding: 35px 40px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); width: 420px; align-self: flex-start; }
        .form-card h2 { margin-bottom: 24px; color: #2c3e50; font-size: 20px; text-align: center; }
        .error { background: #f8d7da; color: #721c24; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; font-size: 13px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-size: 14px; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        .form-group input:focus { outline: none; border-color: #3498db; }
        .btn { width: 100%; padding: 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 15px; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag" th:classappend="${session.role == 'ADMIN'} ? 'tag-admin'" th:text="${session.role == 'ADMIN'} ? '管理员' : '学生'"></span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar" th:if="${session.role == 'STUDENT'}">
        <a href="/student/profile">查看学生信息</a>
        <a href="/class">浏览班级</a>
        <a href="/course">浏览课程</a>
        <a href="/selection/my">我的选课</a>
        <a href="/attendance/my">我的考勤</a>
        <a href="/leave/my">请假申请</a>
        <a href="/grade/my">我的成绩</a>
        <a href="/system/password" class="active">修改密码</a>
    </div>
    <div class="sidebar" th:if="${session.role == 'ADMIN'}">
        <a href="/student">学生管理</a>
        <a href="/class">班级管理</a>
        <a href="/course">课程管理</a>
        <a href="/selection">选课管理</a>
        <a href="/attendance">考勤管理</a>
        <a href="/leave">请假管理</a>
        <a href="/grade">成绩管理</a>
        <a href="/grade/statistics">成绩统计</a>
        <a href="/system/password" class="active">系统管理</a>
    </div>
    <div class="main">
        <div class="form-card">
            <h2>修改密码</h2>
            <div th:if="${error}" class="error" th:text="${error}"></div>
            <form th:action="@{/system/password}" method="post">
                <div class="form-group">
                    <label>原密码</label>
                    <input type="password" name="oldPassword" required placeholder="请输入原密码" />
                </div>
                <div class="form-group">
                    <label>新密码</label>
                    <input type="password" name="newPassword" required placeholder="请输入新密码" />
                </div>
                <div class="form-group">
                    <label>确认新密码</label>
                    <input type="password" name="confirmPassword" required placeholder="请再次输入新密码" />
                </div>
                <button type="submit" class="btn btn-primary">确认修改</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
