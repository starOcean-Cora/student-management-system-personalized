<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>成绩统计 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .tag-admin { background: #e74c3c; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; padding: 25px 30px; }
        .main h2 { color: #2c3e50; font-size: 20px; margin-bottom: 15px; }
        .filter-bar { background: #fff; border-radius: 6px; padding: 15px 20px; margin-bottom: 15px; display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .filter-group { display: flex; flex-direction: column; gap: 4px; }
        .filter-group label { font-size: 13px; color: #888; }
        .filter-group select, .filter-group input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; min-width: 140px; }
        .btn { padding: 8px 18px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-primary:hover { background: #2980b9; }
        .btn-default { background: #95a5a6; color: #fff; }
        .btn-default:hover { background: #7f8c8d; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #fff; border-radius: 6px; padding: 20px; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .stat-card .label { font-size: 13px; color: #888; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; }
        .stat-card .value.avg { color: #3498db; }
        .stat-card .value.max { color: #27ae60; }
        .stat-card .value.min { color: #e74c3c; }
        .stat-card .value.rate { color: #f39c12; }
        .chart-card { background: #fff; border-radius: 6px; padding: 25px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .chart-card h3 { color: #2c3e50; font-size: 16px; margin-bottom: 20px; }
        .bar-row { display: flex; align-items: center; margin-bottom: 12px; }
        .bar-label { width: 90px; font-size: 13px; color: #555; text-align: right; padding-right: 12px; flex-shrink: 0; }
        .bar-track { flex: 1; height: 24px; background: #f0f2f5; border-radius: 4px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s; display: flex; align-items: center; padding-left: 8px; font-size: 12px; color: #fff; font-weight: 600; }
        .bar-fill.r1 { background: #e74c3c; }
        .bar-fill.r2 { background: #f39c12; }
        .bar-fill.r3 { background: #3498db; }
        .bar-fill.r4 { background: #2ecc71; }
        .bar-fill.r5 { background: #27ae60; }
        .empty-tip { text-align: center; color: #999; padding: 40px; font-size: 14px; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag tag-admin">管理员</span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar">
        <a href="/student">学生管理</a>
        <a href="/class">班级管理</a>
        <a href="/course">课程管理</a>
        <a href="/selection">选课管理</a>
        <a href="/attendance">考勤管理</a>
        <a href="/leave">请假管理</a>
        <a href="/grade">成绩管理</a>
        <a href="/grade/statistics" class="active">成绩统计</a>
        <a href="#">系统管理</a>
    </div>
    <div class="main">
        <h2>成绩统计</h2>

        <!-- 筛选区 -->
        <form th:action="@{/grade/statistics}" method="get" class="filter-bar">
            <div class="filter-group">
                <label>课程</label>
                <select name="courseId">
                    <option value="">全部课程</option>
                    <option th:each="c : ${courses}" th:value="${c.id}"
                            th:text="${c.courseName}"
                            th:selected="${courseId} != null and ${courseId} == ${c.id}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>班级</label>
                <select name="classId">
                    <option value="">全部班级</option>
                    <option th:each="c : ${classes}" th:value="${c.id}"
                            th:text="${c.className}"
                            th:selected="${classId} != null and ${classId} == ${c.id}"></option>
                </select>
            </div>
            <div class="filter-group">
                <label>考试类型</label>
                <select name="examType">
                    <option value="">全部类型</option>
                    <option value="期中考试" th:selected="${examType} == '期中考试'">期中考试</option>
                    <option value="期末考试" th:selected="${examType} == '期末考试'">期末考试</option>
                    <option value="平时成绩" th:selected="${examType} == '平时成绩'">平时成绩</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">查询</button>
            <a href="/grade/statistics" class="btn btn-default">重置</a>
        </form>

        <!-- 统计卡片 -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">平均分</div>
                <div class="value avg" th:text="${stats.avg} != null ? ${stats.avg} : '-'">-</div>
            </div>
            <div class="stat-card">
                <div class="label">最高分</div>
                <div class="value max" th:text="${stats.max} != null ? ${#numbers.formatDecimal(stats.max, 0, 0)} : '-'">-</div>
            </div>
            <div class="stat-card">
                <div class="label">最低分</div>
                <div class="value min" th:text="${stats.min} != null ? ${#numbers.formatDecimal(stats.min, 0, 0)} : '-'">-</div>
            </div>
            <div class="stat-card">
                <div class="label">及格率</div>
                <div class="value rate" th:text="${stats.passRate} + '%'">0%</div>
            </div>
        </div>

        <!-- 成绩区间柱状图 -->
        <div class="chart-card">
            <h3>成绩区间分布</h3>
            <th:block th:if="${stats.count} == 0">
                <div class="empty-tip">暂无统计数据</div>
            </th:block>
            <th:block th:if="${stats.count} > 0">
                <div>
                    <div class="bar-row">
                        <span class="bar-label">60分以下</span>
                        <div class="bar-track">
                            <div class="bar-fill r1"
                                 th:style="'width:' + (${stats.maxRange} > 0 ? ${stats.range1} * 100 / ${stats.maxRange} : 0) + '%'"
                                 th:text="${stats.range1} + '人'"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="bar-label">60-70分</span>
                        <div class="bar-track">
                            <div class="bar-fill r2"
                                 th:style="'width:' + (${stats.maxRange} > 0 ? ${stats.range2} * 100 / ${stats.maxRange} : 0) + '%'"
                                 th:text="${stats.range2} + '人'"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="bar-label">70-80分</span>
                        <div class="bar-track">
                            <div class="bar-fill r3"
                                 th:style="'width:' + (${stats.maxRange} > 0 ? ${stats.range3} * 100 / ${stats.maxRange} : 0) + '%'"
                                 th:text="${stats.range3} + '人'"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="bar-label">80-90分</span>
                        <div class="bar-track">
                            <div class="bar-fill r4"
                                 th:style="'width:' + (${stats.maxRange} > 0 ? ${stats.range4} * 100 / ${stats.maxRange} : 0) + '%'"
                                 th:text="${stats.range4} + '人'"></div>
                        </div>
                    </div>
                    <div class="bar-row">
                        <span class="bar-label">90-100分</span>
                        <div class="bar-track">
                            <div class="bar-fill r5"
                                 th:style="'width:' + (${stats.maxRange} > 0 ? ${stats.range5} * 100 / ${stats.maxRange} : 0) + '%'"
                                 th:text="${stats.range5} + '人'"></div>
                        </div>
                    </div>
                </div>
            </th:block>
        </div>
    </div>
</div>
</body>
</html>
