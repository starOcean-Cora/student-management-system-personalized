<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>我的成绩 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .header-right a:hover { text-decoration: underline; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; padding: 25px 30px; }
        .main h2 { color: #2c3e50; font-size: 20px; margin-bottom: 15px; }
        .message { background: #d4edda; color: #155724; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .error { background: #f8d7da; color: #721c24; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .table-card { background: #fff; border-radius: 6px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); overflow-x: auto; }
        .filter-form { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .filter-form input, .filter-form select { height: 34px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; }
        .filter-form input { width: 180px; }
        .filter-form select { width: 150px; }
        .btn { padding: 7px 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #fafbfc; font-weight: 600; color: #555; }
        tr:hover { background: #f8f9fa; }
        .text-danger { color: #e74c3c; font-weight: 600; }
        .empty { text-align: center; color: #999; padding: 20px; }
        .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 8px; margin-top: 15px; font-size: 13px; }
        .page-btn { padding: 5px 10px; border: 1px solid #ddd; border-radius: 4px; color: #555; text-decoration: none; background: #fff; }
        .page-btn:hover, .page-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        .page-btn.disabled { color: #aaa; background: #f5f5f5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="header">
    <h3>学生管理系统</h3>
    <div class="header-right">
        <span th:text="'欢迎，' + ${session.username}"></span>
        <span class="tag">学生</span>
        <a href="/logout" onclick="return confirm('确认退出登录？')">退出</a>
    </div>
</div>
<div class="container">
    <div class="sidebar">
        <a href="/student/profile">查看学生信息</a>
        <a href="/class">浏览班级</a>
        <a href="/course">浏览课程</a>
        <a href="/selection/my">我的选课</a>
        <a href="/attendance/my">我的考勤</a>
        <a href="/leave/my">请假申请</a>
        <a href="/grade/my" class="active">我的成绩</a>
        <a href="#">修改密码</a>
    </div>
    <div class="main">
        <h2>我的成绩</h2>
        <div th:if="${message}" class="message" th:text="${message}"></div>
        <div th:if="${error}" class="error" th:text="${error}"></div>
        <div class="table-card">
            <form class="filter-form" th:action="@{/grade/my}" method="get">
                <input type="text" name="courseName" placeholder="请输入课程名称" th:value="${courseName}">
                <select name="examType">
                    <option value="">全部考试类型</option>
                    <option th:each="e : ${examTypes}" th:value="${e}" th:text="${e}" th:selected="${examType != null and examType == e}"></option>
                </select>
                <button type="submit" class="btn btn-success">查询</button>
                <a th:href="@{/grade/my}" class="btn btn-warning">清空条件</a>
            </form>
            <table>
                <thead>
                <tr>
                    <th>课程</th><th>考试类型</th><th>成绩</th><th>等级</th><th>状态</th><th>录入时间</th><th>备注</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${grades.empty}">
                    <td colspan="7" class="empty">暂无成绩记录</td>
                </tr>
                <tr th:each="g : ${grades}">
                    <td th:text="${g.courseName}"></td>
                    <td th:text="${g.examType}"></td>
                    <td>
                        <span th:if="${g.score < 60}" class="text-danger" th:text="${g.score}"></span>
                        <span th:unless="${g.score < 60}" th:text="${g.score}"></span>
                    </td>
                    <td th:text="${g.gradeLevel}"></td>
                    <td th:text="${g.status}"></td>
                    <td th:text="${g.createTime}"></td>
                    <td th:text="${g.remark}"></td>
                </tr>
                </tbody>
            </table>
            <div class="pagination">
                <span th:text="'共 ' + ${totalElements} + ' 条'">共 0 条</span>
                <span th:if="${currentPage <= 1}" class="page-btn disabled">上一页</span>
                <a th:if="${currentPage > 1}" th:href="@{/grade/my(page=${currentPage - 1}, courseName=${courseName}, examType=${examType})}" class="page-btn">上一页</a>
                <span th:if="${totalPages == 0}" class="page-btn active">1</span>
                <a th:if="${totalPages > 0}" th:each="p : ${pageNumbers}" th:href="@{/grade/my(page=${p}, courseName=${courseName}, examType=${examType})}" th:text="${p}" th:class="${p == currentPage ? 'page-btn active' : 'page-btn'}"></a>
                <span th:if="${currentPage >= totalPages}" class="page-btn disabled">下一页</span>
                <a th:if="${currentPage < totalPages}" th:href="@{/grade/my(page=${currentPage + 1}, courseName=${courseName}, examType=${examType})}" class="page-btn">下一页</a>
                <span th:text="'第 ' + ${currentPage} + ' / ' + ${totalPages == 0 ? 1 : totalPages} + ' 页'">第 1 / 1 页</span>
            </div>
        </div>
    </div>
</div>
</body>
</html>
