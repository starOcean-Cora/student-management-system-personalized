<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><title>我的选课 - 学生管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #f0f2f5; }
        .header { background: #2c3e50; color: #fff; padding: 0 30px; height: 56px; display: flex; justify-content: space-between; align-items: center; }
        .header h3 { font-size: 18px; font-weight: 500; }
        .header-right { display: flex; align-items: center; gap: 15px; font-size: 14px; }
        .header-right a { color: #ecf0f1; text-decoration: none; }
        .tag { background: #3498db; padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .container { display: flex; min-height: calc(100vh - 56px); }
        .sidebar { width: 200px; flex-shrink: 0; background: #fff; padding-top: 10px; box-shadow: 2px 0 6px rgba(0,0,0,0.05); }
        .sidebar a { display: block; padding: 12px 25px; color: #555; text-decoration: none; font-size: 14px; border-left: 3px solid transparent; white-space: nowrap; }
        .sidebar a:hover, .sidebar a.active { background: #f5f6fa; color: #2c3e50; border-left-color: #3498db; }
        .main { flex: 1; min-width: 0; padding: 25px 30px; }
        .main h2 { color: #2c3e50; font-size: 20px; margin-bottom: 15px; }
        .message { background: #d4edda; color: #155724; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .error { background: #f8d7da; color: #721c24; padding: 8px 14px; border-radius: 4px; margin-bottom: 12px; }
        .card { background: #fff; border-radius: 8px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 25px; }
        .card h3 { font-size: 16px; color: #2c3e50; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .filter-form { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-form input, .filter-form select { height: 34px; width: 180px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; font-family: inherit; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; white-space: nowrap; }
        th { background: #fafbfc; font-weight: 600; color: #555; }
        tr:hover { background: #f8f9fa; }
        .btn { padding: 6px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; text-decoration: none; display: inline-block; }
        .btn-primary { background: #3498db; color: #fff; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-warning { background: #f39c12; color: #fff; }
        .label { padding: 2px 8px; border-radius: 3px; font-size: 12px; }
        .label-selected { background: #d4edda; color: #155724; }
        .empty { text-align: center; color: #999; padding: 20px; }
        .pagination { display: flex; justify-content: flex-end; align-items: center; gap: 6px; margin-top: 16px; font-size: 13px; color: #555; flex-wrap: wrap; }
        .page-btn { min-width: 30px; padding: 6px 10px; border: 1px solid #ddd; border-radius: 4px; color: #2c3e50; text-decoration: none; background: #fff; text-align: center; }
        .page-btn.active { background: #3498db; color: #fff; border-color: #3498db; }
        .page-btn.disabled { color: #aaa; background: #f5f5f5; cursor: not-allowed; }
    </style>
</head>
<body>
<div class="header"><h3>学生管理系统</h3><div class="header-right"><span th:text="'欢迎，' + ${session.username}"></span><span class="tag">学生</span><a href="/logout" onclick="return confirm('确认退出登录？')">退出</a></div></div>
<div class="container"><div class="sidebar"><a href="/student/profile">查看学生信息</a><a href="/class">浏览班级</a><a href="/course">浏览课程</a><a href="/selection/my" class="active">我的选课</a><a href="/attendance/my">我的考勤</a><a href="/leave/my">请假申请</a><a href="/grade/my">我的成绩</a><a href="/system/password">修改密码</a></div>
<div class="main"><h2>我的选课</h2><div th:if="${message}" class="message" th:text="${message}"></div><div th:if="${error}" class="error" th:text="${error}"></div>
<div class="card"><h3>可选课程</h3><div class="table-wrap"><table><thead><tr><th>课程编号</th><th>课程名称</th><th>授课教师</th><th>学分</th><th>课时</th><th>操作</th></tr></thead><tbody><tr th:if="${availableCourses.empty}"><td colspan="6" class="empty">暂无可选课程</td></tr><tr th:each="c : ${availableCourses}"><td th:text="${c.courseCode}"></td><td th:text="${c.courseName}"></td><td th:text="${c.teacherName}"></td><td th:text="${c.credit}"></td><td th:text="${c.classHours}"></td><td><a th:href="@{/selection/select/{id}(id=${c.id})}" class="btn btn-success">选课</a></td></tr></tbody></table></div></div>
<div class="card"><h3>我的选课记录</h3><form class="filter-form" th:action="@{/selection/my}" method="get"><input type="text" name="courseName" placeholder="请输入课程名称" th:value="${courseName}"><select name="courseId"><option value="">全部课程</option><option th:each="c : ${courses}" th:value="${c.id}" th:text="${c.courseName}" th:selected="${courseId != null and courseId == c.id}"></option></select><button type="submit" class="btn btn-success">查询</button><a th:href="@{/selection/my}" class="btn btn-warning">清空条件</a></form><div class="table-wrap"><table><thead><tr><th>课程名称</th><th>选课时间</th><th>状态</th><th>操作</th></tr></thead><tbody><tr th:if="${#lists.isEmpty(mySelections)}"><td colspan="4" class="empty">暂无选课记录</td></tr><tr th:each="s : ${mySelections}"><td th:text="${s.courseName}"></td><td th:text="${s.selectTime}"></td><td><span class="label label-selected" th:text="${s.status}"></span></td><td><a th:href="@{/selection/cancel/{id}(id=${s.id})}" class="btn btn-danger" onclick="return confirm('确认取消此选课吗？')">取消</a></td></tr></tbody></table></div><div class="pagination"><span th:text="'共 ' + ${totalElements} + ' 条'">共 0 条</span><span th:if="${currentPage <= 1}" class="page-btn disabled">上一页</span><a th:if="${currentPage > 1}" th:href="@{/selection/my(page=${currentPage - 1}, courseName=${courseName}, courseId=${courseId})}" class="page-btn">上一页</a><span th:if="${totalPages == 0}" class="page-btn active">1</span><a th:if="${totalPages > 0}" th:each="p : ${pageNumbers}" th:href="@{/selection/my(page=${p}, courseName=${courseName}, courseId=${courseId})}" th:text="${p}" th:class="${p == currentPage ? 'page-btn active' : 'page-btn'}"></a><span th:if="${currentPage >= totalPages}" class="page-btn disabled">下一页</span><a th:if="${currentPage < totalPages}" th:href="@{/selection/my(page=${currentPage + 1}, courseName=${courseName}, courseId=${courseId})}" class="page-btn">下一页</a><span th:text="'第 ' + ${currentPage} + ' / ' + ${totalPages == 0 ? 1 : totalPages} + ' 页'">第 1 / 1 页</span></div></div>
</div></div></body></html>
